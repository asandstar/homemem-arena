<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回声屋 · 记忆宅邸 | HomeMem Arena</title>
  <script>
    // GitHub Pages SPA 404 重定向方案
    // 把 404 路径保存到 sessionStorage，然后跳回首页，
    // index.html 加载后再从 sessionStorage 读取并恢复路由。
    (function () {
      var base = '/homemem-arena/';
      var location = window.location;
      var path = location.pathname.substring(base.length) || '';
      var search = location.search;
      var hash = location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      window.location.replace(base + (hash ? hash : ''));
    })();
  </script>
</head>
<body>
  <p>正在加载...</p>
</body>
</html>
